<!DOCTYPE html>
<html>
    <head>
        <title>Color Pattern Generator</title>
        <style>
            #grid
            {
                display: grid;
                grid-template-columns: repeat(5, 40px);
                gap: 20px;
                margin-top: 20px;
            }
            .box
            {
                width: 40x;
                height: 40px;
                border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <h3>Color Pattern Generator</h3>
        <div id="grid"></div>
        <script>
        let colors = ["red", "blue", "green", "orange"];
        let grid = document.getElementById("grid");
        let index = 0;
        for(let i = 0; i < 3; i++) {
            for(let j = 0; j < 5; j++) {
                let box = document.createElement("div");
                box.className = "box";
                box.style.backgroundColor = colors[index % colors.length];
                grid.appendChild(box);
                index++;
            }
        }
        </script>
    </body>
</html>
