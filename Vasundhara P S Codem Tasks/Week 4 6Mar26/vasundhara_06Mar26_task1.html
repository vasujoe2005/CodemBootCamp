<!DOCTYPE html>
<html>
    <head>
        <title>Dynamic Scoreboard</title>
    </head>
    <body>
        <h2>Scoreboard</h2>
        <div id="scoreboard"></div>
        <h3 id="highest"></h3>
        <h3 id="lowest"></h3>
        <script>
            let scores = [10, 15, 8];
            function renderScores() {
                let board = document.getElementById("scoreboard");
                board.innerHTML = ""; 
                for (let i = 0; i < scores.length; i++) {
                    let div = document.createElement("div");
                    div.innerHTML ="Player " + (i + 1) + ": " + scores[i] + " <button onclick='increaseScore(" + i + ")'>+</button>" + " <button onclick='decreaseScore(" + i + ")'>-</button>";
                    board.appendChild(div);
                }
                let highest = Math.max(...scores);
                let lowest = Math.min(...scores);
                document.getElementById("highest").innerText = "Highest Score: " + highest;
                document.getElementById("lowest").innerText = "Lowest Score: " + lowest;
            }
            function increaseScore(index) {
                scores[index] = scores[index] + 1;
                renderScores();
            }
            function decreaseScore(index) {
                scores[index] = scores[index] - 1;
                renderScores();
            }
            renderScores();
        </script>
    </body>
</html>
