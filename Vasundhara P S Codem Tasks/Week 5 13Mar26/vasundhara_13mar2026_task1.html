<!DOCTYPE html>
<html>
    <head>
        <title>Advanced Function Operations</title>
    </head>
    <body>
        <h2>Advanced Function Operations</h2>
        <script>
            function calculateSum(a, b) {
                return a + b;
            }
            function calculateProduct(a, b) {
                return a * b;
            }
            let sumResult = calculateSum(5, 3);
            let productResult = calculateProduct(4, 6);
            console.log("Sum Result:", sumResult);
            console.log("Product Result:", productResult);
        </script>
    </body>
</html>
