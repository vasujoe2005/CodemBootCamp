<!DOCTYPE html>
<html>
    <head>
        <title>Function Expressions and Arrow Functions</title>
    </head>
    <body>
        <h2>Function Expressions and Arrow Functions</h2>
        <script>
            const getLength = function (str) {
                return str.length;
            };
            const square = (num) => num * num;
            let lengthResult = getLength("JavaScript");
            let squareResult = square(5);
            console.log("String Length:", lengthResult);
            console.log("Square Value:", squareResult);
        </script>
    </body>
</html>
