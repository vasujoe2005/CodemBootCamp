<!DOCTYPE html>
<html>
    <head>
        <title>IIFE Example</title>
    </head>
    <body>
        <h2>Immediately Invoked Function Expression (IIFE)</h2>
        <script>
            (function () {
                let num = 8;
                let result = num * 4;
                console.log("Result from IIFE:", result);
            })();
        </script>
    </body>
</html>
