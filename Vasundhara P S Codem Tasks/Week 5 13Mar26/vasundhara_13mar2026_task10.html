<!DOCTYPE html>
<html>
    <head>
        <title>Advanced Function Validation Utility</title>
    </head>
    <body>
        <h2>Advanced Form Validation Utility</h2>
        <form onsubmit="mainValidation(event)">
          <label>Name:</label><br>
          <input type="text" id="name"><br><br>
          <label>Email:</label><br>
          <input type="email" id="email"><br><br>
          <label>Password:</label><br>
          <input type="password" id="password"><br><br>
          <button type="submit">Submit</button>
        </form>
        <script>
            function checkEmpty(value) {
              return value === "";
            }
            function validateEmail(email) {
              return email.includes("@") && email.includes(".");
            }
            function validatePassword(password) {
              return password.length >= 8;
            }
            function mainValidation(event) {
              let name = document.getElementById("name").value.trim();
              let email = document.getElementById("email").value.trim();
              let password = document.getElementById("password").value.trim();
              if (checkEmpty(name) || checkEmpty(email) || checkEmpty(password)) {
                console.log("Error: Fields cannot be empty");
                event.preventDefault();
                return;
              }
              if (!validateEmail(email)) {
                console.log("Invalid Email Format");
                event.preventDefault();
                return;
              }
              if (!validatePassword(password)) {
                console.log("Password must be at least 8 characters");
                event.preventDefault();
                return;
              }
              console.log("Form submitted successfully");
            }
        </script>
    </body>
</html>
