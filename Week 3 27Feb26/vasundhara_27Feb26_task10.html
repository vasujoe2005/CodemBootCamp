<!DOCTYPE html>
<html>
<head>
    <title>Attribute Manipulation</title>
</head>
<body>
    <h2>Attribute Manipulation Based on User Interaction </h2>
    <button id="toggleBtn">Toggle Disable</button>
    <br><br>
    <input type="text" id="textInput" placeholder="Type something here">
    <script>
        const toggleBtn = document.getElementById("toggleBtn");
        const textInput = document.getElementById("textInput");
        toggleBtn.addEventListener("click", function () {
            if (textInput.hasAttribute("disabled")) {
                textInput.removeAttribute("disabled");
                console.log("Attribute removed: disabled = false");
            } 
            else {
                textInput.setAttribute("disabled", "true");
                console.log("Attribute added: disabled = true");
            }
        });
    </script>
</body>
</html>
